# Cloudflare Pages + Functions + D1 (T-001). The SPA builds to dist/ (Pages),
# and functions/ is the API layer. Secrets (SELEMENE_API_KEY, SELEMENE_API_URL)
# are set via `wrangler pages secret put` / .dev.vars — never committed here.
#
# Pages build settings (T-057) — dashboard (git integration) or `wrangler pages deploy`:
#   Build command:       npm run build        # tsc + vite build
#   Build output dir:    dist                 # = pages_build_output_dir below
#   Functions directory: functions/           # auto-detected at the project root
#   Node version:        22 (matches CI)
# Local proof of the same layout: npm run build && wrangler pages dev dist.
name = "urania-137"
compatibility_date = "2026-07-01"
pages_build_output_dir = "dist"

# Public config (non-secret) — T-059. Only values that are REAL and non-secret
# belong here. SELEMENE_API_URL is the public engine base (also the code default).
# CF_ACCESS_AUD / CF_ACCESS_TEAM_DOMAIN are intentionally ABSENT: their real values
# come from the 9d9d Access app (T-081, human) and will be set then (T-067) — no
# placeholders are pushed to production. Absent vars fail closed: any JWT presented
# before then fails verification -> 401. SELEMENE_API_KEY (secret, pending rotation)
# is set via `wrangler pages secret put`, never here. DEV_IDENTITY_EMAIL must never
# appear in this file or in Pages production env.
[vars]
SELEMENE_API_URL = "https://selemene.tryambakam.space"

# Per-user readings store (T-080). Production D1 provisioned 2026-07-20 in the
# 9d9d account (region APAC). Pages applies this single binding to all deployments;
# the preview database below is recorded for attaching to the Pages preview
# environment via the dashboard if preview isolation is wanted:
#   preview: database_name = "urania-137-db-preview"
#            database_id   = "6b90d773-0233-4dcf-b548-2feb61365c77"
[[d1_databases]]
binding = "DB"
database_name = "urania-137-db"
database_id = "d57550ea-c8d3-48fc-a2ee-c6b3fc41948e"
