name: CI

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid pushes / PR updates).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test (unit + V8 CF-Access suites)
        run: npm test

      - name: V7 static delink gate (no Vercel remnants)
        run: node scripts/verify/delink-check.mjs

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npx vite build
